<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<title>FILE 10b. Table Toolbar</title>
<style>
    :root {
      /* Primary Blue */
      --color-primary-50: #EFF6FF;
      --color-primary-100: #DBEAFE;
      --color-primary-200: #BFDBFE;
      --color-primary-300: #93C5FD;
      --color-primary-400: #60A5FA;
      --color-primary-500: #3B82F6;
      --color-primary-600: #2563EB;
      --color-primary-700: #1D4ED8;
      --color-primary-800: #1E40AF;
      --color-primary-900: #1E3A8A;

      /* Slate Gray */
      --color-slate-50: #F8FAFC;
      --color-slate-100: #F1F5F9;
      --color-slate-200: #E2E8F0;
      --color-slate-300: #CBD5E1;
      --color-slate-400: #94A3B8;
      --color-slate-500: #64748B;
      --color-slate-600: #475569;
      --color-slate-700: #334155;
      --color-slate-800: #1E293B;
      --color-slate-900: #0F172A;

      /* Text */
      --color-text-primary: #0F172A;
      --color-text-secondary: #475569;
      --color-text-muted: #94A3B8;
      --color-text-inverse: #FFFFFF;
      --color-text-link: #2563EB;

      /* Semantic */
      --color-success: #10B981;
      --color-success-bg: #ECFDF5;
      --color-warning: #F59E0B;
      --color-warning-bg: #FFFBEB;
      --color-error: #EF4444;
      --color-error-bg: #FEF2F2;

      /* Backgrounds */
      --color-bg-primary: #FFFFFF;
      --color-bg-secondary: #F8FAFC;
      --color-bg-tertiary: #F1F5F9;
      --color-bg-hover: #F8FAFC;
      --color-bg-active: #EFF6FF;
      --color-bg-overlay: rgba(0, 0, 0, 0.4);
      --color-surface-soft: #F1F5F9;

      /* Borders */
      --color-border-default: #E2E8F0;
      --color-border-strong: #CBD5E1;
      --color-border-focus: #2563EB;

      /* Shadows */
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-lg: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-xl: 0 8px 24px rgba(0,0,0,0.10);

      /* Radius */
      --radius-sm: 4px;
      --radius-md: 6px;
      --radius-lg: 8px;
      --radius-xl: 12px;
      --radius-full: 9999px;

      /* Spacing */
      --space-1: 4px;  --space-2: 8px;  --space-3: 12px;
      --space-4: 16px; --space-5: 20px; --space-6: 24px;
      --space-8: 32px; --space-10: 40px; --space-12: 48px;

      /* Sizes */
      --size-control-sm: 32px;
      --size-control-md: 36px;
      --size-control-lg: 44px;
      --size-header-height: 56px;
      --size-sidebar-width: 220px;
      --size-sidebar-collapsed: 56px;
      --size-content-max-width: 1200px;

      /* Font */
      --font-family: "Inter", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      --font-size-xs: 12px;  --font-size-sm: 13px;
      --font-size-base: 14px; --font-size-md: 16px;
      --font-size-lg: 18px;  --font-size-xl: 20px;
      --font-size-2xl: 24px;

      /* Interaction */
      --transition-fast: all 0.15s ease;
      --focus-ring: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--color-bg-primary);
      font-family: var(--font-family);
      color: var(--color-text-primary);
      -webkit-font-smoothing: antialiased;
      padding: 40px;
    }
    .page-wrap { max-width: 960px; margin: 0 auto; }
    .page-title { font-size: 32px; font-weight: 700; color: var(--color-text-primary); }
    .page-desc { font-size: 14px; color: var(--color-text-secondary); margin-top: 8px; }
    .divider { border: none; border-top: 1px solid var(--color-border-default); margin: 24px 0; }
    .section-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: var(--color-text-primary); }
    .section-gap { height: 40px; }

    /* BEGIN: Component Styles */
    /* Tab Filter */
    .tab-container { display: flex; gap: var(--space-6); border-bottom: 1px solid var(--color-border-default); }
    .tab-item { padding: var(--space-3) 0; font-size: var(--font-size-base); color: var(--color-text-secondary); cursor: pointer; transition: var(--transition-fast); border-bottom: 2px solid transparent; }
    .tab-item:hover { color: var(--color-primary-600); }
    .tab-item.active { color: var(--color-primary-600); border-bottom-color: var(--color-primary-600); font-weight: 500; }
    .tab-count { color: var(--color-text-muted); font-size: var(--font-size-xs); margin-left: 4px; }

    /* Toolbar */
    .toolbar-row { display: flex; align-items: center; gap: var(--space-3); padding: var(--space-4) 0; }
    .search-wrapper { position: relative; flex: 1; }
    .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--color-text-muted); pointer-events: none; }
    .input-base { height: var(--size-control-md); border: 1px solid var(--color-border-default); border-radius: var(--radius-md); font-size: var(--font-size-base); padding: 0 var(--space-3); transition: var(--transition-fast); outline: none; width: 100%; }
    .search-wrapper .input-base { padding-left: 36px; }
    .input-base:focus { border-color: var(--color-border-focus); box-shadow: var(--focus-ring); }
    
    .btn { height: var(--size-control-md); padding: 0 var(--space-4); border-radius: var(--radius-md); font-size: var(--font-size-base); font-weight: 500; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; transition: var(--transition-fast); border: 1px solid transparent; text-decoration: none; }
    .btn-primary { background: var(--color-primary-600); color: var(--color-text-inverse); }
    .btn-primary:hover { background: var(--color-primary-700); }
    .btn-ghost { background: transparent; color: var(--color-text-secondary); }
    .btn-ghost:hover { background: var(--color-bg-hover); color: var(--color-text-primary); }
    .btn-danger-ghost { background: transparent; color: var(--color-error); }
    .btn-danger-ghost:hover { background: var(--color-error-bg); }

    .dropdown { position: relative; user-select: none; }
    .dropdown-trigger { height: var(--size-control-md); border: 1px solid var(--color-border-default); border-radius: var(--radius-md); padding: 0 var(--space-3); display: flex; align-items: center; gap: var(--space-2); background: #fff; cursor: pointer; font-size: var(--font-size-base); min-width: 120px; transition: var(--transition-fast); }
    .dropdown-trigger:hover { background: var(--color-bg-secondary); }
    .dropdown.active .dropdown-trigger { border-color: var(--color-border-focus); box-shadow: var(--focus-ring); }

    .view-toggle { display: flex; border: 1px solid var(--color-border-default); border-radius: var(--radius-md); overflow: hidden; }
    .toggle-btn { width: var(--size-control-md); height: var(--size-control-md); display: flex; align-items: center; justify-content: center; background: #fff; cursor: pointer; color: var(--color-text-muted); transition: var(--transition-fast); border: none; }
    .toggle-btn:not(:last-child) { border-right: 1px solid var(--color-border-default); }
    .toggle-btn.active { color: var(--color-primary-600); background: var(--color-primary-50); }

    /* Batch Bar */
    .batch-bar { background: var(--color-primary-50); border: 1px solid var(--color-primary-100); border-radius: var(--radius-md); padding: var(--space-2) var(--space-4); display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-4); }
    .batch-info { color: var(--color-primary-800); font-weight: 500; font-size: var(--font-size-base); }
    .batch-actions { display: flex; gap: var(--space-2); }

    /* Sortable Header */
    .lumos-table { width: 100%; border-collapse: collapse; }
    .lumos-table thead th { text-align: left; padding: var(--space-3) var(--space-4); background: var(--color-bg-secondary); border-bottom: 1px solid var(--color-border-default); color: var(--color-text-secondary); font-size: var(--font-size-sm); font-weight: 600; cursor: pointer; transition: var(--transition-fast); }
    .lumos-table thead th:hover { background: var(--color-bg-tertiary); }
    .sort-icon-box { display: inline-flex; flex-direction: column; vertical-align: middle; margin-left: 4px; color: var(--color-text-muted); }
    .sort-icon-box svg { display: block; }
    /* END: Component Styles */
  </style>
</head>
<body>
<div class="page-wrap">
<h1 class="page-title">FILE 10b. Table Toolbar</h1>
<p class="page-desc">Filter, Search, Sort, Batch actions</p>
<hr class="divider"/>
<!-- BEGIN: Tab Filter -->
<h3 class="section-title">1. Tab Filter</h3>
<div class="tab-container" data-purpose="tab-filter">
<div class="tab-item active" onclick="this.parentElement.querySelectorAll('.tab-item').forEach(i =&gt; i.classList.remove('active')); this.classList.add('active')">
        All <span class="tab-count">(1,240)</span>
</div>
<div class="tab-item" onclick="this.parentElement.querySelectorAll('.tab-item').forEach(i =&gt; i.classList.remove('active')); this.classList.add('active')">
        Active <span class="tab-count">(840)</span>
</div>
<div class="tab-item" onclick="this.parentElement.querySelectorAll('.tab-item').forEach(i =&gt; i.classList.remove('active')); this.classList.add('active')">
        Pending <span class="tab-count">(320)</span>
</div>
<div class="tab-item" onclick="this.parentElement.querySelectorAll('.tab-item').forEach(i =&gt; i.classList.remove('active')); this.classList.add('active')">
        Archived <span class="tab-count">(80)</span>
</div>
</div>
<!-- END: Tab Filter -->
<div class="section-gap"></div>
<!-- BEGIN: Toolbar -->
<h3 class="section-title">2. Toolbar</h3>
<div class="toolbar-row" data-purpose="search-sort-toolbar">
<!-- Search Input -->
<div class="search-wrapper">
<span class="search-icon">
<svg fill="none" height="18" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" viewbox="0 0 24 24" width="18">
<circle cx="11" cy="11" r="8"></circle>
<line x1="21" x2="16.65" y1="21" y2="16.65"></line>
</svg>
</span>
<input class="input-base" placeholder="Search records..." type="text"/>
</div>
<!-- Date Dropdown -->
<div class="dropdown" id="date-dropdown">
<div class="dropdown-trigger" onclick="toggleActive(this.parentElement)">
<svg fill="none" height="16" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" viewbox="0 0 24 24" width="16">
<rect height="18" rx="2" ry="2" width="18" x="3" y="4"></rect>
<line x1="16" x2="16" y1="2" y2="6"></line>
<line x1="8" x2="8" y1="2" y2="6"></line>
<line x1="3" x2="21" y1="10" y2="10"></line>
</svg>
<span>Date Range</span>
<svg fill="none" height="14" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" style="margin-left: auto;" viewbox="0 0 24 24" width="14">
<polyline points="6 9 12 15 18 9"></polyline>
</svg>
</div>
</div>
<!-- Sort Dropdown -->
<div class="dropdown" id="sort-dropdown">
<div class="dropdown-trigger" onclick="toggleActive(this.parentElement)">
<span>Sort: Recent</span>
<svg fill="none" height="14" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" style="margin-left: auto;" viewbox="0 0 24 24" width="14">
<polyline points="6 9 12 15 18 9"></polyline>
</svg>
</div>
</div>
<!-- Actions -->
<button class="btn btn-ghost">Reset</button>
<button class="btn btn-primary">Search</button>
<!-- View Toggle -->
<div class="view-toggle">
<button class="toggle-btn active" onclick="this.parentElement.querySelectorAll('.toggle-btn').forEach(b =&gt; b.classList.remove('active')); this.classList.add('active')">
<svg fill="none" height="18" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="18">
<line x1="8" x2="21" y1="6" y2="6"></line>
<line x1="8" x2="21" y1="12" y2="12"></line>
<line x1="8" x2="21" y1="18" y2="18"></line>
<line x1="3" x2="3.01" y1="6" y2="6"></line>
<line x1="3" x2="3.01" y1="12" y2="12"></line>
<line x1="3" x2="3.01" y1="18" y2="18"></line>
</svg>
</button>
<button class="toggle-btn" onclick="this.parentElement.querySelectorAll('.toggle-btn').forEach(b =&gt; b.classList.remove('active')); this.classList.add('active')">
<svg fill="none" height="18" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="18">
<rect height="7" width="7" x="3" y="3"></rect>
<rect height="7" width="7" x="14" y="3"></rect>
<rect height="7" width="7" x="14" y="14"></rect>
<rect height="7" width="7" x="3" y="14"></rect>
</svg>
</button>
</div>
</div>
<!-- END: Toolbar -->
<div class="section-gap"></div>
<!-- BEGIN: Batch Bar -->
<h3 class="section-title">3. Batch Bar</h3>
<div class="batch-bar" data-purpose="batch-actions-overlay">
<span class="batch-info">3 items selected</span>
<div class="batch-actions">
<button class="btn btn-ghost btn-sm" style="height: 32px;">Edit</button>
<button class="btn btn-ghost btn-sm" style="height: 32px;">Archive</button>
<button class="btn btn-danger-ghost btn-sm" style="height: 32px;">Delete</button>
</div>
</div>
<!-- END: Batch Bar -->
<div class="section-gap"></div>
<!-- BEGIN: Sortable Header -->
<h3 class="section-title">4. Sortable Header</h3>
<table class="lumos-table" data-purpose="data-table-header">
<thead>
<tr>
<th>
            Project Name
            <span class="sort-icon-box">
<svg fill="none" height="10" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="3" viewbox="0 0 24 24" width="10"><polyline points="18 15 12 9 6 15"></polyline></svg>
<svg fill="none" height="10" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="3" style="color: var(--color-primary-600);" viewbox="0 0 24 24" width="10"><polyline points="6 9 12 15 18 9"></polyline></svg>
</span>
</th>
<th>
            Client
            <span class="sort-icon-box">
<svg fill="none" height="10" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="3" viewbox="0 0 24 24" width="10"><polyline points="18 15 12 9 6 15"></polyline></svg>
<svg fill="none" height="10" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="3" viewbox="0 0 24 24" width="10"><polyline points="6 9 12 15 18 9"></polyline></svg>
</span>
</th>
<th>
            Amount
            <span class="sort-icon-box">
<svg fill="none" height="10" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="3" viewbox="0 0 24 24" width="10"><polyline points="18 15 12 9 6 15"></polyline></svg>
<svg fill="none" height="10" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="3" viewbox="0 0 24 24" width="10"><polyline points="6 9 12 15 18 9"></polyline></svg>
</span>
</th>
<th>
            Status
            <span class="sort-icon-box">
<svg fill="none" height="10" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="3" viewbox="0 0 24 24" width="10"><polyline points="18 15 12 9 6 15"></polyline></svg>
<svg fill="none" height="10" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="3" viewbox="0 0 24 24" width="10"><polyline points="6 9 12 15 18 9"></polyline></svg>
</span>
</th>
</tr>
</thead>
</table>
<!-- END: Sortable Header -->
</div>
<script data-purpose="event-handlers">
    function toggleActive(el) { el.classList.toggle('active'); }
    
    document.addEventListener('click', function(e) {
      document.querySelectorAll('.dropdown.active').forEach(function(d) {
        if (!d.contains(e.target)) d.classList.remove('active');
      });
    });
  </script>
</body></html>
